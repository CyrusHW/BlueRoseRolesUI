plugins {
    id "java"
    id "application"
    id "org.openjfx.javafxplugin" version "0.1.0"
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(26)
    }
}

javafx {
    version = "26"
    modules = [ "javafx.controls", "javafx.web" ]
}

application {
    mainClass = 'blue.rose.App'
}

repositories {
    mavenCentral()
}

dependencies {
    // Adding this explicitly often fixes the missing JSObject package in 2026
    implementation "org.openjfx:javafx-web:26"
    implementation "org.openjfx:javafx-controls:26"
    
    implementation libs.guava
    testImplementation libs.junit.jupiter
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

// Remove the tasks.withType(JavaCompile) block entirely. 
// The javafxplugin handles this via the module-path automatically.
// This tells the compiler where to find JSObject
tasks.withType(JavaCompile) {
    options.compilerArgs += ["--add-modules", "jdk.jsobject"]
}
tasks.named("run", JavaExec) {
    // Configuration-cache safe approach
    def cp = classpath
    classpath = cp 
    
    jvmArgs = [
        "--module-path", cp.asPath,
        "--add-modules", "javafx.controls,javafx.web" 
        // Note: jdk.jsobject is usually provided by javafx.web now
    ]
}
